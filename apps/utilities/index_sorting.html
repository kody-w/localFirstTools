<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting to Gallery…</title>
    <meta http-equiv="refresh" content="0; url=../../index.html">
    <link rel="canonical" href="../../index.html">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
               background:#0a0a0f; color:#eee; display:flex; align-items:center;
               justify-content:center; height:100vh; margin:0; }
        a { color:#7df9ff; }
    </style>
</head>
<body>
    <p>The gallery moved to the root <code>index.html</code>. Redirecting…
       <a href="../../index.html">Click here if you aren't redirected.</a></p>

        // Preserve any query string / hash the visitor had.
        const target = '../../index.html' + window.location.search + window.location.hash;
        window.location.replace(target);
    </script>
</body>
